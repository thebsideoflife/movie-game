<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Final Cut — movie trivia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Fraunces:ital,wght@0,600;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#faf9fb; --panel:#ffffff; --panel2:#f3f1f6; --line:#e5e2ea;
  --red:#d6221c; --red2:#ef4136; --glow:rgba(214,34,28,.22);
  --steel:#3a3542; --text:#221f28; --muted:#6f6a7a;
  --good:#16a34a; --bad:#dc2626; --radius:18px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--bg); color:var(--text);
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background-image:radial-gradient(1100px 560px at 50% -180px, #f7e6e3 0%, var(--bg) 62%);
  min-height:100dvh;
}
.wrap{max-width:680px;margin:0 auto;padding:20px 16px 60px}
.display{font-family:'Anton',Impact,'Arial Black',sans-serif;letter-spacing:.03em;text-transform:uppercase;font-weight:400}
button{font-family:inherit;cursor:pointer;border:none}
input,textarea,select{font-family:inherit;font-size:16px}

/* ---------- shared ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 26px;border-radius:10px;font-weight:800;font-size:15px;letter-spacing:.06em;text-transform:uppercase;transition:.15s transform,.15s opacity;user-select:none}
.btn:active{transform:scale(.97)}
.btn-gold{background:linear-gradient(180deg,var(--red2),var(--red));color:#fff;box-shadow:0 6px 20px var(--glow);text-shadow:0 1px 2px rgba(0,0,0,.25)}
.btn-ghost{background:#fff;color:var(--steel);border:1px solid var(--line)}
.btn-ghost:hover{border-color:var(--red2)}
.btn-sm{padding:9px 16px;font-size:12.5px}
.btn[disabled]{opacity:.4;pointer-events:none}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:22px;box-shadow:0 6px 24px rgba(30,15,15,.06)}
.tag{display:inline-block;padding:4px 12px;border-radius:6px;font-size:11.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;background:rgba(214,34,28,.08);color:var(--red);border:1px solid rgba(214,34,28,.25)}
.muted{color:var(--muted)}
.center{text-align:center}
input[type=text],textarea,select{width:100%;background:#fff;border:1px solid var(--line);border-radius:10px;color:var(--text);padding:13px 16px;outline:none}
input[type=text]:focus,textarea:focus{border-color:var(--red2)}
::placeholder{color:#a49fae}

/* ---------- header / progress ---------- */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:10px}
.brand{font-family:'Anton',Impact,sans-serif;font-size:19px;color:var(--red);letter-spacing:.09em;cursor:pointer;text-transform:uppercase}
.scorepill{background:#fff;border:1px solid var(--line);border-radius:999px;padding:7px 14px;font-weight:700;font-size:14px;color:var(--steel)}
.scorepill b{color:var(--red)}
.progress{height:5px;background:#ecebf0;border-radius:99px;overflow:hidden;margin-bottom:22px}
.progress i{display:block;height:100%;background:linear-gradient(90deg,var(--red),var(--red2));border-radius:99px;transition:width .4s ease}

/* ---------- home ---------- */
.hero{text-align:center;padding:26px 0 22px}
.herologo{width:min(360px,78vw);filter:drop-shadow(0 16px 40px rgba(214,34,28,.30));margin-bottom:4px}
.hero h1{font-family:'Anton',Impact,sans-serif;font-size:clamp(52px,13vw,74px);line-height:.95;text-transform:uppercase;color:var(--steel)}
.hero h1 em{color:var(--red);font-style:normal}
.hero .sub{color:var(--muted);letter-spacing:.5em;text-transform:uppercase;font-size:12px;font-weight:700;margin-top:10px}
.hero p{color:var(--muted);margin-top:12px;font-size:15.5px}
.marquee{display:inline-block;border:2px solid var(--red);border-radius:10px;padding:6px 18px;margin-bottom:18px;color:var(--red);font-size:12px;font-weight:800;letter-spacing:.25em;text-transform:uppercase}
.menu{display:grid;gap:14px;margin-top:8px}
.menucard{display:flex;align-items:center;gap:16px;text-align:left;background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:20px;color:var(--text);transition:.15s border-color,.15s box-shadow;box-shadow:0 4px 18px rgba(30,15,15,.05)}
.menucard:hover{border-color:var(--red2);box-shadow:0 8px 28px rgba(214,34,28,.12)}
.menucard .ico{font-size:26px;width:52px;height:52px;display:flex;align-items:center;justify-content:center;background:var(--panel2);border-radius:12px;flex-shrink:0;border:1px solid var(--line)}
.menucard h3{font-size:16.5px;margin-bottom:3px}
.menucard p{font-size:13.5px;color:var(--muted);line-height:1.45}
.menucard .soon{margin-left:auto;flex-shrink:0}

/* ---------- round intro ---------- */
.roundintro{text-align:center;padding:40px 0}
.roundintro .num{font-size:12px;letter-spacing:.34em;text-transform:uppercase;color:var(--red);margin-bottom:14px;font-weight:800}
.roundintro h2{font-family:'Anton',Impact,sans-serif;font-size:clamp(34px,9vw,52px);line-height:1.02;margin-bottom:18px;text-transform:uppercase;color:var(--steel)}
.roundintro .rule{color:var(--muted);font-size:16px;line-height:1.6;max-width:440px;margin:0 auto 30px}
.pts{color:var(--red);font-weight:700}

/* ---------- question ---------- */
.qhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.qhead .qnum{font-size:12px;color:var(--muted);font-weight:700;letter-spacing:.14em;text-transform:uppercase}
.potbadge{background:rgba(214,34,28,.07);border:1px solid rgba(214,34,28,.3);color:var(--red);font-weight:800;border-radius:8px;padding:6px 14px;font-size:14px;transition:.3s}
.prompt{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:clamp(22px,5.5vw,30px);line-height:1.25;margin-bottom:20px}
.answerbar{display:flex;gap:10px;margin-top:20px}
.answerbar input{flex:1}
.subnote{font-size:13px;color:var(--muted);margin-top:10px}
.shake{animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}

/* clue list */
.clues{display:grid;gap:10px}
.clue{background:#fff;border:1px solid var(--line);border-radius:10px;padding:13px 16px;font-size:16.5px;animation:pop .35s ease;border-left:3px solid var(--red);box-shadow:0 2px 10px rgba(30,15,15,.04)}
.clue.hidden-clue{opacity:.45;border-style:dashed;border-left-style:dashed;color:var(--muted);font-size:14px;text-align:center;box-shadow:none}
@keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* quote */
.quotecard{background:#fff;border:1px solid var(--line);border-radius:14px;padding:26px 24px;margin-bottom:6px;box-shadow:0 4px 18px rgba(30,15,15,.05)}
.quotecard .q{font-family:'Fraunces',Georgia,serif;font-style:italic;font-size:clamp(20px,5vw,26px);line-height:1.4}
.quotecard .q::before{content:"C";color:var(--red);font-size:1.4em}
.quotecard .q::after{content:"D";color:var(--red);font-size:1.4em}
.speakbtn{margin-top:16px;background:none;border:1px solid var(--line);color:var(--muted);border-radius:999px;padding:8px 16px;font-size:13px;font-weight:600}
.speakbtn:hover{color:var(--red);border-color:var(--red2)}

/* ordering */
.slots{display:grid;gap:8px;margin-bottom:18px}
.slot{min-height:52px;border:1.5px dashed #d5d1dc;border-radius:10px;display:flex;align-items:center;padding:0 14px;gap:10px;color:var(--muted);font-size:14px;background:#fdfcfe}
.slot.filled{border-style:solid;border-color:#cfc9d8;background:#fff;color:var(--text);font-size:16px;cursor:pointer;font-weight:600}
.slot .idx{width:24px;height:24px;border-radius:50%;background:var(--panel2);border:1px solid rgba(214,34,28,.35);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--red);flex-shrink:0}
.pool{display:flex;flex-wrap:wrap;gap:8px}
.chip{background:#fff;border:1px solid var(--line);color:var(--text);border-radius:999px;padding:11px 18px;font-size:15px;font-weight:600;box-shadow:0 2px 8px rgba(30,15,15,.05)}
.chip:hover{border-color:var(--red2)}
.chip.used{opacity:.25;pointer-events:none}
.oghost{position:fixed;z-index:999;pointer-events:none;box-shadow:0 12px 30px rgba(0,0,0,.25);background:#fff;border:1.5px solid var(--red2)}

/* anagram */
.scramble{font-family:'Anton',Impact,sans-serif;font-size:clamp(30px,8.5vw,46px);text-align:center;color:var(--red);letter-spacing:.05em;margin:10px 0 22px;text-transform:uppercase}
.mask{text-align:center;font-family:ui-monospace,Menlo,monospace;font-size:clamp(18px,5vw,26px);letter-spacing:.18em;margin-bottom:18px;min-height:34px;word-break:break-word;color:var(--steel)}

/* math */
.mathrow{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:10px;border-left:3px solid var(--red);box-shadow:0 2px 10px rgba(30,15,15,.04)}
.mathrow .clue-t{font-family:'Fraunces',Georgia,serif;font-size:19px;margin-bottom:10px}
.mathop{text-align:center;font-size:26px;color:var(--red);font-weight:800;margin:4px 0}

/* twins */
.twininputs{display:grid;gap:10px;margin-top:18px}
.posters{display:flex;gap:12px;justify-content:center;margin:16px 0}
.posters img{width:46%;max-width:220px;border-radius:10px;border:1px solid var(--line);animation:pop .5s ease;box-shadow:0 10px 26px rgba(30,15,15,.18)}

/* pieces */
.piecebox{position:relative;max-width:420px;margin:0 auto 8px;border-radius:12px;overflow:hidden;border:1px solid var(--line);box-shadow:0 10px 26px rgba(30,15,15,.15)}
.piecebox img{width:100%;display:block}
.tilegrid{position:absolute;inset:0;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(6,1fr)}
.tile{background:#dedae5;border:1px solid #fff;transition:opacity .6s ease}
.tile.open{opacity:0}

/* reveal */
.revealcard{text-align:center;padding:34px 24px}
.bigmark{font-size:46px;margin-bottom:8px}
.revealcard .verdict{font-weight:800;font-size:20px;margin-bottom:6px}
.revealcard .ans{font-family:'Anton',Impact,sans-serif;font-size:clamp(26px,7vw,38px);color:var(--red);margin:10px 0 4px;text-transform:uppercase;letter-spacing:.03em}
.revealcard .sub{color:var(--muted);font-size:15px;margin-bottom:8px}
.fact{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:14px 16px;font-size:14px;color:var(--muted);margin:16px 0;line-height:1.55;text-align:left;border-left:3px solid var(--red)}
.fact b{color:var(--red)}
.ptsline{font-size:17px;margin:10px 0 20px}
.ptsline b{color:var(--red);font-size:22px}

/* scoreboard / final */
.scoretable{width:100%;border-collapse:collapse;margin:18px 0}
.scoretable td{padding:11px 6px;border-bottom:1px solid var(--line);font-size:15px}
.scoretable td:last-child{text-align:right;font-weight:700}
.bar{height:8px;background:var(--panel2);border-radius:99px;overflow:hidden;margin-top:6px}
.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--red),var(--red2));border-radius:99px}
.finalscore{font-family:'Anton',Impact,sans-serif;font-size:clamp(58px,17vw,92px);color:var(--red);line-height:1}
.qdots{display:flex;gap:6px;justify-content:center;margin:14px 0}
.qdot{width:12px;height:12px;border-radius:50%;background:var(--panel2);border:1px solid var(--line)}
.qdot.hit{background:var(--good);border-color:var(--good)}
.qdot.part{background:var(--red2);border-color:var(--red2)}
.qdot.miss{background:var(--bad);border-color:var(--bad);opacity:.6}

/* creator / admin */
.crhead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:560px){.grid2{grid-template-columns:1fr}}
.gtile,.rtile{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:0 4px 18px rgba(30,15,15,.05);transition:.15s border-color,.15s box-shadow,.15s transform;position:relative}
.gtile:hover,.rtile:hover{border-color:var(--red2);box-shadow:0 8px 28px rgba(214,34,28,.12)}
.rtile{cursor:pointer}
.rtile.dragover{border-color:var(--red);box-shadow:0 0 0 3px var(--glow);transform:scale(1.02)}
.rtile .drag{position:absolute;top:14px;right:14px;color:#b9b4c2;font-size:18px;cursor:grab;user-select:none}
.gtile h3,.rtile h3{font-size:16px;margin:8px 0 4px;line-height:1.3;word-break:break-word}
.tilemeta{font-size:12.5px;color:var(--muted)}
.tileactions{display:flex;gap:4px;margin-top:12px;flex-wrap:wrap}
.tileactions button{background:var(--panel2);border:1px solid var(--line);color:var(--steel);font-size:13px;padding:6px 10px;border-radius:8px}
.tileactions button:hover{border-color:var(--red2);color:var(--red)}
.addtile{border:2px dashed #d5d1dc;border-radius:16px;display:flex;align-items:center;justify-content:center;min-height:120px;color:var(--muted);font-weight:700;background:none;font-size:14.5px}
.addtile:hover{border-color:var(--red2);color:var(--red)}
.qrow{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin-bottom:8px;font-size:14px}
.qrow .lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.qrow button{background:none;color:#8d879a;font-size:15px;padding:2px 5px}
.qrow button:hover{color:var(--red)}
.field{margin-bottom:12px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:6px}
.formactions{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
.exportbox{width:100%;height:110px;font-family:ui-monospace,monospace;font-size:11px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:linear-gradient(180deg,var(--red2),var(--red));color:#fff;font-weight:700;padding:12px 22px;border-radius:999px;box-shadow:0 8px 30px rgba(120,20,15,.35);z-index:99;animation:pop .3s ease}

.fab{position:fixed;bottom:22px;right:22px;width:58px;height:58px;border-radius:50%;background:linear-gradient(180deg,var(--red2),var(--red));color:#fff;font-size:25px;box-shadow:0 10px 28px var(--glow);z-index:90;display:flex;align-items:center;justify-content:center;border:none}
.fab:hover{transform:scale(1.06)}

.wrap.wide{max-width:1100px}
.creatorcols{display:grid;grid-template-columns:280px 1fr;gap:24px;align-items:start;margin-top:4px}
@media(max-width:800px){.creatorcols{grid-template-columns:1fr}}
.palette{display:grid;gap:8px;padding:2px}
.pcard{background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px 12px;cursor:grab;box-shadow:0 3px 10px rgba(30,15,15,.04);transition:.15s transform,.15s border-color,.15s box-shadow;user-select:none;display:flex;gap:11px;align-items:center;text-align:left}
.pcard:hover{border-color:var(--red2);transform:translateX(3px);box-shadow:0 8px 20px rgba(214,34,28,.12)}
.pcard:active{cursor:grabbing}
.pcard .pico{font-size:19px;width:38px;height:38px;border-radius:10px;background:rgba(214,34,28,.08);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pcard b{font-size:13.5px;display:block;margin-bottom:2px}
.pcard p{font-size:11.5px;color:var(--muted);line-height:1.4}
.dropslot{border:2px dashed #d5d1dc;border-radius:16px;display:flex;align-items:center;justify-content:center;gap:8px;min-height:132px;color:var(--muted);font-weight:600;font-size:14px;transition:.15s;background:none}
.dropslot.dragover{border-color:var(--red);box-shadow:0 0 0 3px var(--glow)}
.dropslot span{font-size:20px;color:var(--red2)}
.rtile .ticon{font-size:17px;margin-left:6px}
.typechips{display:flex;flex-wrap:wrap;gap:8px}
.typechip{background:#fff;border:1.5px solid var(--line);border-radius:10px;padding:9px 13px;font-size:13px;font-weight:600;color:var(--steel)}
.typechip:hover{border-color:var(--red2)}
.typechip.sel{border-color:var(--red);background:rgba(214,34,28,.07);color:var(--red)}

/* live rooms */
.buzzbtn{width:min(160px,42vw);aspect-ratio:1;border-radius:50%;background:radial-gradient(circle at 35% 30%,var(--red2),var(--red) 70%);color:#fff;font-family:'Anton',Impact,sans-serif;font-size:26px;letter-spacing:.06em;box-shadow:0 12px 32px var(--glow),inset 0 -6px 18px rgba(0,0,0,.25);border:5px solid #fff}
.buzzbtn:active{transform:scale(.93)}
.buzzbtn[disabled]{opacity:.35;filter:grayscale(.5);pointer-events:none}
.buzzmsg{font-weight:800;font-size:20px;padding:26px;border-radius:16px;background:#fff;border:1px solid var(--line);display:inline-block}
.buzzmsg.you{color:var(--good);border-color:var(--good)}
.buzzmsg.out{color:var(--muted)}
.livescores{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:14px}
.scorechip{background:#fff;border:1px solid var(--line);border-radius:999px;padding:7px 14px;font-size:14px}
.scorechip b{color:var(--red)}
.scorechip.buzzing{border-color:var(--red);box-shadow:0 0 0 3px var(--glow)}

.hostans{background:#fffdf2;border:1.5px dashed #dfc46a;border-radius:12px;padding:12px 16px;margin-top:14px;font-size:14.5px;display:flex;align-items:center;flex-wrap:wrap;gap:4px}

#videostrip{position:fixed;top:12px;right:12px;display:flex;flex-wrap:wrap;gap:10px;z-index:95;max-width:560px;justify-content:flex-end}
.vtile{width:min(260px,24vw);aspect-ratio:4/3;border-radius:14px;overflow:hidden;background:#000;position:relative;box-shadow:0 10px 30px rgba(0,0,0,.35);border:3px solid #fff}
.vtile video{width:100%;height:100%;object-fit:cover;display:block}
.vtile span{position:absolute;bottom:6px;left:10px;color:#fff;font-size:13px;font-weight:800;text-shadow:0 1px 4px rgba(0,0,0,.9)}
.miclive{display:block;text-align:center;background:linear-gradient(180deg,var(--red2),var(--red));color:#fff;font-weight:800;padding:10px 18px;border-radius:12px;box-shadow:0 6px 20px var(--glow);animation:micpulse 1.6s infinite;font-size:14px;margin:0 0 14px}
@keyframes micpulse{0%,100%{opacity:1}50%{opacity:.7}}
.vmic{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.55);color:#fff;border-radius:999px;padding:6px 11px;font-size:11.5px;font-weight:800;border:1px solid rgba(255,255,255,.45);cursor:pointer;z-index:2}
.vmic.on{background:linear-gradient(180deg,var(--red2),var(--red));border-color:#fff;animation:micpulse 1.6s infinite}
.audiobtn{background:linear-gradient(180deg,var(--red2),var(--red));color:#fff;font-weight:800;border-radius:999px;padding:12px 18px;font-size:14px;box-shadow:0 8px 24px var(--glow);align-self:center}
@media(max-width:700px){
  #videostrip{max-width:100vw;left:0;right:0;top:auto;bottom:0;padding:8px 8px calc(8px + env(safe-area-inset-bottom));justify-content:center;background:rgba(255,255,255,.88);backdrop-filter:blur(8px);border-top:1px solid var(--line)}
  .vtile{width:30vw}
  body.hasvideo .wrap{padding-bottom:calc(26vw + 84px)}
  body.hasvideo .fab{bottom:calc(26vw + 30px)}
}

/* TMDB panel */
.tmdb{position:fixed;top:0;right:0;bottom:0;width:min(400px,94vw);background:#fff;border-left:1px solid var(--line);box-shadow:-12px 0 40px rgba(30,15,15,.12);z-index:98;padding:20px;overflow-y:auto}
.tmdb-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.tmdb-res{margin-top:12px}
.tmdb-item{display:flex;gap:12px;align-items:center;padding:10px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;cursor:pointer}
.tmdb-item:hover{border-color:var(--red2)}
.tmdb-item img,.noposter{width:44px;height:66px;border-radius:6px;object-fit:cover;flex-shrink:0}
.noposter{background:var(--panel2);display:flex;align-items:center;justify-content:center}
.tmdb-detail{display:flex;gap:14px;align-items:flex-start;line-height:1.55;font-size:14px}
.tmdb-detail img{width:100px;border-radius:8px}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
/* =====================================================
   a movie game — playable POC
   single-file prototype: player engine + creator
   ===================================================== */

/* ---------- embedded images (injected at build) ---------- */

/* ---------- fuzzy answer matching (Levenshtein) ---------- */
function normalize(s){
  return (s||"").toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/&/g," and ")
    .replace(/[^a-z0-9\s]/g," ")
    .replace(/\b(the|a|an)\b/g," ")
    .replace(/\s+/g," ").trim();
}
function lev(a,b){
  const m=a.length,n=b.length;
  if(!m)return n; if(!n)return m;
  let prev=new Array(n+1),cur=new Array(n+1);
  for(let j=0;j<=n;j++)prev[j]=j;
  for(let i=1;i<=m;i++){
    cur[0]=i;
    for(let j=1;j<=n;j++){
      cur[j]=Math.min(prev[j]+1,cur[j-1]+1,prev[j-1]+(a[i-1]===b[j-1]?0:1));
    }
    [prev,cur]=[cur,prev];
  }
  return prev[n];
}
function isMatch(guess,answers){
  const g=normalize(guess);
  if(!g)return false;
  for(const raw of answers){
    const a=normalize(raw);
    if(!a)continue;
    if(g===a)return true;
    const thr = a.length<=4 ? 0 : a.length<=8 ? 1 : Math.min(3,Math.floor(a.length/5));
    if(lev(g,a)<=thr)return true;
    if(a.length>=5 && g.includes(a))return true; // "it's jaws" -> jaws (len guard)
  }
  return false;
}

/* ---------- tiny helpers ---------- */
const $=id=>document.getElementById(id);
const app=()=>$("app");
function setWide(on){const a=app();if(a)a.classList.toggle("wide",!!on);}
function esc(s){return (s??"").toString().replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function toast(msg){
  const t=document.createElement("div");t.className="toast";t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),1800);
}
function pickRobotVoice(){
  const vs=speechSynthesis.getVoices()||[];
  return vs.find(v=>/zarvox/i.test(v.name))
      || vs.find(v=>/trinoids|whisper|fred/i.test(v.name))
      || vs.find(v=>/^en/i.test(v.lang)&&/male|david|daniel|alex/i.test(v.name))
      || vs.find(v=>/^en/i.test(v.lang))
      || vs[0]||null;
}
function speakText(text){
  try{
    const u=new SpeechSynthesisUtterance(text);
    u.rate=.8;u.pitch=.3;
    const v=pickRobotVoice();if(v)u.voice=v;
    speechSynthesis.cancel();speechSynthesis.speak(u);
  }catch(e){toast("Speech not supported on this device")}
}
function speakQuote(){
  const q=S&&S.game.rounds[S.ri].questions[S.qi];
  if(q&&q.quote)speakText(q.quote);
}
function liveSpeakQuote(){
  try{
    let q=null;
    if(L&&L.role==="host")q=L.game.rounds[L.ri].questions[L.qi];
    else if(L&&L.game&&L.view)q=(L.game.rounds[L.view.ri]||{questions:[]}).questions[L.view.qi];
    if(q&&q.quote)speakText(q.quote);
  }catch(e){}
}
function shuffled(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function imgSrc(ref){
  if(!ref)return "";
  if(IMG[ref])return IMG[ref];
  return ref; // data URL or http URL from creator
}

/* ---------- game state ---------- */
let S=null;   // play session
let RT=null;  // per-question runtime
function clearRT(){ if(RT&&RT.interval)clearInterval(RT.interval); RT=null; }

function startGame(game){
  clearRT();
  S={game, ri:0, qi:0, phase:"roundIntro", score:0,
     results:game.rounds.map(r=>r.questions.map(()=>null))};
  render();
}
function totalQs(g){return g.rounds.reduce((s,r)=>s+r.questions.length,0);}
function doneQs(){let n=0;for(let i=0;i<S.ri;i++)n+=S.game.rounds[i].questions.length;return n+S.qi;}

/* ---------- render root ---------- */
function render(){
  window.scrollTo(0,0);setWide(false);
  if(!S){renderHome();return;}
  const g=S.game;
  const head=`
    <div class="topbar">
      <div class="brand" onclick="goHome()">Final Cut</div>
      <div style="display:flex;gap:8px;align-items:center">
        <div class="scorepill">score <b>${S.score}</b></div>
        <button class="btn btn-ghost btn-sm" onclick="goHome()" title="Exit game">← back</button>
      </div>
    </div>
    <div class="progress"><i style="width:${Math.round(100*doneQs()/totalQs(g))}%"></i></div>`;
  if(S.phase==="roundIntro")return renderRoundIntro(head);
  if(S.phase==="question")return renderQuestion(head);
  if(S.phase==="reveal")return renderReveal(head);
  if(S.phase==="roundScore")return renderRoundScore(head);
  if(S.phase==="final")return renderFinal(head);
}
function goHome(){
  if(S && S.phase!=="final" && !confirm("Leave the game? Progress will be lost."))return;
  clearRT();S=null;render();
}

function promptImport(){
  const code=prompt("Paste the game code or JSON:");
  if(!code)return;
  try{

    if(!g.rounds||!g.rounds.length)throw 0;
    startGame(g);
  }catch(e){toast("Couldn't read that code");}
}

/* ---------- round intro ---------- */
function renderRoundIntro(head){
  const r=S.game.rounds[S.ri];
  app().innerHTML=head+`
  <div class="roundintro">
    <div class="num">Round ${S.ri+1} of ${S.game.rounds.length}</div>
    <h2 class="display">${esc(r.name)}</h2>
    <div class="rule">${r.rule||""}</div>
    <button class="btn btn-gold" onclick="beginQuestion()">Start round</button>
  </div>`;
}
function beginQuestion(){
  S.phase="question";
  const r=S.game.rounds[S.ri],q=r.questions[S.qi];
  clearRT();
  RT={start:Date.now(),attempts:2,cluesShown:1,hints:0,tiles:0,order:[],pool:null};
  if(r.type==="listReveal"){
    RT.interval=setInterval(()=>{
      if(RT.cluesShown<q.clues.length){RT.cluesShown++;updateCluesOnly();}
      else clearInterval(RT.interval);
    },6000);
  }
  if(r.type==="ordering"){ RT.pool=shuffled(q.items.map((it,i)=>i)); RT.order=[null,null,null,null]; }
  if(r.type==="quote")setTimeout(()=>{try{speakQuote()}catch(e){}},450);
  if(r.type==="pieces"){
    RT.tiles=4;
    RT.tileOrder=piecesOrder();
    RT.interval=setInterval(()=>{
      if(RT.tiles<24){RT.tiles++;renderTilesOnly();}
      else clearInterval(RT.interval);
    },2500);
  }
  render();
}
function piecesOrder(){
  // 4 cols x 6 rows = 24 tiles; reveal top 4 rows first (titles usually live at the bottom)
  const top=shuffled([...Array(16).keys()]);          // tiles 0..15 (rows 0-3)
  const bottom=shuffled([16,17,18,19,20,21,22,23]);   // rows 4-5 last
  return top.concat(bottom);
}

/* ---------- question rendering ---------- */
function pot(){
  const r=S.game.rounds[S.ri];
  if(r.type==="listReveal")return Math.max(4,11-RT.cluesShown);
  if(r.type==="anagram")return Math.max(4,10-2*RT.hints);
  if(r.type==="pieces")return Math.max(3,15-Math.floor((RT.tiles-4)/2));
  if(r.type==="math")return 15;
  if(r.type==="twins")return 10;
  return 10;
}

let ODrag=null;
function initOrderDnD(){
  document.querySelectorAll("[data-oitem]").forEach(el=>{
    el.style.touchAction="none";
    el.onpointerdown=e=>{
      if(el.classList.contains("used"))return;
      ODrag={item:parseInt(el.getAttribute("data-oitem")),
        fromSlot:el.hasAttribute("data-oslot")?parseInt(el.getAttribute("data-oslot")):null,
        x0:e.clientX,y0:e.clientY,moved:false,ghost:null,el:el};
      try{el.setPointerCapture&&el.setPointerCapture(e.pointerId);}catch(err){}
    };
    el.onpointermove=e=>{
      if(!ODrag||ODrag.el!==el)return;
      const dx=e.clientX-ODrag.x0,dy=e.clientY-ODrag.y0;
      if(!ODrag.moved&&Math.hypot(dx,dy)>8){
        ODrag.moved=true;
        const g=document.createElement("div");
        g.className="chip oghost";g.textContent=el.textContent.replace("drag · tap to remove","").trim();
        document.body.appendChild(g);ODrag.ghost=g;
        el.style.opacity=".35";
      }
      if(ODrag.moved&&ODrag.ghost){
        ODrag.ghost.style.left=(e.clientX-50)+"px";
        ODrag.ghost.style.top=(e.clientY-26)+"px";
        document.querySelectorAll(".slot").forEach(s=>s.classList.remove("dragover"));
        const t=document.elementFromPoint(e.clientX,e.clientY);
        const sl=t&&t.closest?t.closest("[data-slotidx]"):null;
        if(sl)sl.classList.add("dragover");
      }
    };
    el.onpointerup=e=>{
      if(!ODrag||ODrag.el!==el)return;
      const d=ODrag;ODrag=null;
      if(d.ghost)d.ghost.remove();
      el.style.opacity="";
      if(!d.moved){
        if(d.fromSlot!=null)unslot(d.fromSlot);else slot(d.item);
        return;
      }
      const t=document.elementFromPoint(e.clientX,e.clientY);
      const sl=t&&t.closest?t.closest("[data-slotidx]"):null;
      if(sl){dragItem=d.item;dropSlot(parseInt(sl.getAttribute("data-slotidx")));}
      else render();
    };
    el.onpointercancel=()=>{
      if(ODrag&&ODrag.el===el){if(ODrag.ghost)ODrag.ghost.remove();ODrag=null;render();}
    };
  });
}

function anagramMask(q){
  const ans=q.display||q.answers[0];
  if(!RT.maskOrder){
    const idxs=[];[...ans].forEach((ch,i)=>{if(/[a-z0-9]/i.test(ch))idxs.push(i);});
    RT.maskOrder=shuffled(idxs);
  }
  const showN=Math.ceil(RT.maskOrder.length*(RT.hints/4));
  const show=new Set(RT.maskOrder.slice(0,showN));
  return [...ans].map((ch,i)=>{
    if(!/[a-z0-9]/i.test(ch))return ch===" "?"&nbsp;&nbsp;&nbsp;&nbsp;":esc(ch);
    return show.has(i)?esc(ch.toUpperCase()):"_";
  }).join(" ");
}

  if(RT.order.includes(i))return;

}

function dropSlot(t){
  if(dragItem==null)return;
  const from=RT.order.indexOf(dragItem);
  const prev=RT.order[t];

}

/* ---------- submissions ---------- */
function speedBonus(){
  const t=(Date.now()-RT.start)/1000;
  return t<=8?5:t<=15?3:t<=25?1:0;
}
function submitGuess(){
  const r=S.game.rounds[S.ri],q=r.questions[S.qi];
  const el=$("guess");if(!el)return;
  const guess=el.value.trim();if(!guess)return;
  if(isMatch(guess,q.answers)){
    let earned=pot();
    if(r.type==="quote"||r.type==="riddle")earned+=speedBonus();
    finishQuestion(true,earned,maxFor(r));
  }else{
    RT.attempts--;
    if(RT.attempts<=0)return finishQuestion(false,0,maxFor(r));
    el.value="";el.classList.add("shake");setTimeout(()=>el.classList.remove("shake"),450);
    const a=$("attempts");if(a){a.textContent="Not it — 1 attempt left";a.style.color="var(--bad)";}
    el.focus();
  }
}
function submitOrder(){
  const r=S.game.rounds[S.ri],q=r.questions[S.qi];
  let correct=0;
  RT.order.forEach((it,posn)=>{if(it===posn)correct++;});
  const perfect=correct===4;
  const earned=perfect?10+(((Date.now()-RT.start)/1000)<=20?3:0):correct*2;
  RT.orderResult={correct,perfect};
  finishQuestion(perfect,earned,13,correct>0);
}
function submitMath(){
  const q=S.game.rounds[S.ri].questions[S.qi];
  let earned=0;RT.partHits=[];
  q.parts.forEach((p,i)=>{
    const v=($("m"+i)?.value||"").trim();
    const hit=isMatch(v,p.answers);
    if(hit)earned+=5;
    RT.partHits.push(hit);
  });
  finishQuestion(earned===15,earned,15,earned>0);
}
function submitTwins(){
  const q=S.game.rounds[S.ri].questions[S.qi];
  const g0=($("t0")?.value||"").trim(),g1=($("t1")?.value||"").trim();
  const hitA=isMatch(g0,q.a.answers)||isMatch(g1,q.a.answers);
  const hitB=isMatch(g0,q.b.answers)||isMatch(g1,q.b.answers);
  const earned=(hitA?5:0)+(hitB?5:0);
  RT.twinHits=[hitA,hitB];
  finishQuestion(hitA&&hitB,earned,10,earned>0);
}
function maxFor(r){
  return {listReveal:10,quote:15,ordering:13,riddle:15,anagram:10,math:15,twins:10,pieces:15}[r.type]||10;
}
function finishQuestion(correct,earned,max,partial){
  if(RT.interval)clearInterval(RT.interval);
  earned=Math.round(earned);
  S.score+=earned;
  S.results[S.ri][S.qi]={correct,earned,max,partial:!!partial&&!correct,time:Math.round((Date.now()-RT.start)/1000)};
  S.phase="reveal";
  render();
}

function tmdbUsePoster(url,title){
  const mark=e=>{e.style.borderColor="var(--good)";};
  // [image field, accepted-answers field, display-answer field] per question type
  const map=[["f_img","f_answers","f_display"],["f_ai","f_aa","f_ad"],["f_bi","f_ba","f_bd"]];
  for(const ids of map){
    const e=document.getElementById(ids[0]);
    if(e&&!e.value.trim()){
      e.value=url;mark(e);
      if(title){
        const a=document.getElementById(ids[1]);
        if(a&&!a.value.trim()){a.value=title;mark(a);}
        const di=document.getElementById(ids[2]);
        if(di&&!di.value.trim()){di.value=title;mark(di);}
      }
      toast("🖼 Poster + title dropped in");
      return;
    }
  }
  // no open image field — also offer title to plain answer fields (quote/riddle/etc.)
  const a=document.getElementById("f_answers"),di=document.getElementById("f_display");
  if(title&&((a&&!a.value.trim())||(di&&!di.value.trim()))){
    if(a&&!a.value.trim()){a.value=title;mark(a);}
    if(di&&!di.value.trim()){di.value=title;mark(di);}
    toast("Title dropped into the answer fields");
    return;
  }
  (navigator.clipboard?navigator.clipboard.writeText(url):Promise.reject())
    .then(()=>toast("Poster URL copied — open a question with an image field and paste it"))
    .catch(()=>{prompt("Copy this poster URL:",url);});
}
function tmdbCopy(){
  const t=document.getElementById("tmdbfacts");if(!t)return;
  (navigator.clipboard?navigator.clipboard.writeText(t.value):Promise.reject())
    .then(()=>toast("Facts copied"))
    .catch(()=>{prompt("Copy:",t.value);});
}

/* --- question editor (simple per-type forms) --- */
function editQ(ri,qi){
  setWide(false);
  const r=C.rounds[ri];
  const q=qi>=0?r.questions[qi]:null;
  const t=r.type;
  const v=(x)=>esc(x||"");
  let fields="";
  if(t==="listReveal"){
    fields=`
    ${f("Clues — one per line, revealed in this order","ta","f_clues",(q?q.clues.join("\n"):""))}
    ${f("Accepted answers — comma separated","in","f_answers",(q?q.answers.join(", "):""))}
    ${f("Display answer","in","f_display",v(q&&q.display))}
    ${f("Fun fact (optional)","in","f_fact",v(q&&q.fact))}`;
  }else if(t==="quote"){
    fields=`
    ${f("The quote","ta","f_quote",v(q&&q.quote))}
    ${f("What are you asking? (e.g. Name the movie)","in","f_ask",v(q&&q.ask))}
    ${f("Accepted answers — comma separated","in","f_answers",(q?q.answers.join(", "):""))}
    ${f("Display answer","in","f_display",v(q&&q.display))}
    ${f("Fun fact (optional)","in","f_fact",v(q&&q.fact))}`;
  }else if(t==="ordering"){
    fields=`
    ${f("Prompt (e.g. Order by release date, earliest first)","in","f_prompt",v(q&&q.prompt))}
    ${f("Movies in the CORRECT order — one per line. Add a note after a | (e.g. Scream | Dec 1996). Players see them shuffled.","ta","f_items",(q?q.items.map(it=>it.label+(it.note?" | "+it.note:"")).join("\n"):""))}
    ${f("Fun fact (optional)","in","f_fact",v(q&&q.fact))}`;
  }else if(t==="riddle"){
    fields=`
    ${f("The reworded title","ta","f_prompt",v(q&&q.prompt))}
    ${f("Accepted answers — comma separated","in","f_answers",(q?q.answers.join(", "):""))}
    ${f("Display answer","in","f_display",v(q&&q.display))}
    ${f("Fun fact (optional)","in","f_fact",v(q&&q.fact))}`;
  }else if(t==="anagram"){
    fields=`
    ${f("The scramble players see","in","f_scramble",v(q&&q.scramble))}
    ${f("Accepted answers — comma separated","in","f_answers",(q?q.answers.join(", "):""))}
    ${f("Display answer (used for letter hints)","in","f_display",v(q&&q.display))}`;
  }else if(t==="math"){
    const P=i=>q&&q.parts[i];
    fields=`
    ${f("Operator between line 1 and 2 (×, +, −)","in","f_op",v(q&&q.op)||"+")}
    ${f("Line 1 clue","in","f_c0",v(P(0)&&P(0).clue))}${f("Line 1 answers (comma sep)","in","f_a0",P(0)?P(0).answers.join(", "):"")}${f("Line 1 display","in","f_d0",v(P(0)&&P(0).display))}
    ${f("Line 2 clue","in","f_c1",v(P(1)&&P(1).clue))}${f("Line 2 answers","in","f_a1",P(1)?P(1).answers.join(", "):"")}${f("Line 2 display","in","f_d1",v(P(1)&&P(1).display))}
    ${f("Result clue","in","f_c2",v(P(2)&&P(2).clue))}${f("Result answers","in","f_a2",P(2)?P(2).answers.join(", "):"")}${f("Result display","in","f_d2",v(P(2)&&P(2).display))}`;
  }else if(t==="twins"){
    fields=`
    ${f("Prompt (e.g. 1998: devastating asteroids)","in","f_prompt",v(q&&q.prompt))}
    ${f("Movie A — accepted answers (comma sep)","in","f_aa",q?q.a.answers.join(", "):"")}
    ${f("Movie A — display","in","f_ad",v(q&&q.a.display))}
    ${f("Movie A — poster URL (optional, 🎬 research → 🖼 Use this poster)","in","f_ai",v(q&&q.a.img&&!IMG[q.a.img]?q.a.img:""))}
    ${f("Movie B — accepted answers","in","f_ba",q?q.b.answers.join(", "):"")}
    ${f("Movie B — display","in","f_bd",v(q&&q.b.display))}
    ${f("Movie B — poster URL (optional, 🎬 research → 🖼 Use this poster)","in","f_bi",v(q&&q.b.img&&!IMG[q.b.img]?q.b.img:""))}
    ${f("Fun fact (optional)","in","f_fact",v(q&&q.fact))}`;
  }else if(t==="pieces"){
    fields=`
    ${f("Poster image — paste a URL, or use 🎬 research → 🖼 Use this poster","in","f_img",v(q&&q.img&&!IMG[q.img]?q.img:""))}
    ${f("Accepted answers — comma separated","in","f_answers",(q?q.answers.join(", "):""))}
    ${f("Display answer","in","f_display",v(q&&q.display))}
    ${f("Fun fact (optional)","in","f_fact",v(q&&q.fact))}`;
  }
  app().innerHTML=`
  <div class="topbar"><div class="brand">Final Cut</div>
    <button class="btn btn-ghost btn-sm" onclick="renderRoundEditor(${ri})">← back</button></div>

    <div class="tag" style="margin-bottom:14px">${TYPE_META[t].label}</div>
    ${fields}
    <div class="formactions">
      <button class="btn btn-gold" onclick="saveQ(${ri},${qi})">Save question</button>
      <button class="btn btn-ghost" onclick="renderRoundEditor(${ri})">Cancel</button>
    </div>
  </div><button class="fab" onclick="tmdbPanel()" title="Movie research (TMDB)">🎬</button>`;
}
function f(label,kind,id,val){
  return `<div class="field"><label>${label}</label>${
    kind==="ta"?`<textarea id="${id}" rows="4">${val}</textarea>`
               :`<input type="text" id="${id}" value="${val}">`}</div>`;
}
function gv(id){const e=$(id);return e?e.value.trim():"";}
function csv(id){return gv(id).split(",").map(s=>s.trim()).filter(Boolean);}
function saveQ(ri,qi){
  const r=C.rounds[ri],t=r.type;
  let q=null;
  try{
    if(t==="listReveal")q={clues:gv("f_clues").split("\n").map(s=>s.trim()).filter(Boolean),answers:csv("f_answers"),display:gv("f_display"),fact:gv("f_fact")||undefined};
    if(t==="quote")q={quote:gv("f_quote"),ask:gv("f_ask")||"Name the movie",answers:csv("f_answers"),display:gv("f_display"),fact:gv("f_fact")||undefined};
    if(t==="ordering")q={prompt:gv("f_prompt"),items:gv("f_items").split("\n").map(s=>s.trim()).filter(Boolean).map(line=>{const[label,note]=line.split("|").map(x=>x.trim());return{label,note};}),fact:gv("f_fact")||undefined};
    if(t==="riddle")q={prompt:gv("f_prompt"),answers:csv("f_answers"),display:gv("f_display"),fact:gv("f_fact")||undefined};
    if(t==="anagram")q={scramble:gv("f_scramble"),answers:csv("f_answers"),display:gv("f_display")};
    if(t==="math")q={op:gv("f_op")||"+",parts:[0,1,2].map(i=>({clue:gv("f_c"+i),answers:csv("f_a"+i),display:gv("f_d"+i)}))};
    if(t==="twins")q={prompt:gv("f_prompt"),a:{answers:csv("f_aa"),display:gv("f_ad"),img:gv("f_ai")||undefined},b:{answers:csv("f_ba"),display:gv("f_bd"),img:gv("f_bi")||undefined},fact:gv("f_fact")||undefined};
    if(t==="pieces")q={img:gv("f_img"),answers:csv("f_answers"),display:gv("f_display"),fact:gv("f_fact")||undefined};
  }catch(e){return toast("Something's off in the form");}
  // light validation
  const needsAnswers=["listReveal","quote","riddle","anagram","pieces"];
  if(needsAnswers.includes(t)&&(!q.answers||!q.answers.length))return toast("Add at least one accepted answer");
  if(t==="ordering"&&(!q.items||q.items.length!==4))return toast("Ordering needs exactly 4 movies");
  if(t==="math"&&q.parts.some(p=>!p.answers.length))return toast("Each math line needs answers");
  if(t==="twins"&&(!q.a.answers.length||!q.b.answers.length))return toast("Both movies need answers");
  if(qi>=0)r.questions[qi]=q;else r.questions.push(q);
  persistC();renderRoundEditor(ri);
}

  try{call.answer(V.stream||undefined);}catch(e){}

  call.on("stream",rs=>addVideo(call.peer,rs,isHostPeer(call.peer)?"host":liveNameFor(call.peer),true,true));
  call.on("close",()=>{if(V.calls[call.peer]===call)removeVideo(call.peer);});
}
function callParticipants(){
  if(!V.stream||!L||!L.peer)return;
  const vp=L.role==="host"?(L.videoParts||[]):((L.view&&L.view.vparts)||[]);
  const myId=L.role==="host"?(L.peer.id||""):L.myId;
  const idxMe=vp.findIndex(x=>x.id===myId);
  for(const p of vp){
    if(p.id===myId)continue;
    if(L.role==="player"&&isHostPeer(p.id))continue; // host calls players, not the reverse — keeps mic audio in the offer
    if(L.role==="player"){
      const idxP=vp.findIndex(x=>x.id===p.id);
      if(idxMe!==-1&&idxP>idxMe)continue; // among players: only call those who enabled before me
    }
    if(V.calls[p.id])continue;
    try{
      const call=L.peer.call(p.id,V.stream);
      if(!call)continue;
      V.calls[p.id]=call;
      call.on("stream",rs=>addVideo(p.id,rs,p.name,true,true));
      call.on("close",()=>{if(V.calls[p.id]===call)removeVideo(p.id);});
    }catch(e){}
  }
}

function liveHostStart(gameObj,attempt){
  attempt=attempt||0;
  if(typeof Peer==="undefined")return toast("Live rooms need internet — PeerJS didn't load");
  const game=JSON.parse(JSON.stringify(gameObj));
  delete game._id;delete game._updated;
  game.rounds=game.rounds.filter(r=>r.questions.length);
  if(!game.rounds.length)return toast("That game has no questions yet");
  liveLeave();
  const code=liveCode();
  L={role:"host",code,game,players:{},conns:{},ri:0,qi:0,screen:"lobby",cluesShown:1,tiles:4,lockedBy:null,buzzedOut:[],interval:null,revealData:null,tileOrder:[],shufOrder:[],answerMode:"voice",auto:false,showAns:true,typedAnswer:null,videoOn:false,videoParts:[]};
  const peer=new Peer("finalcut-"+code.toLowerCase());
  L.peer=peer;
  peer.on("open",()=>{if(L)renderLiveHost();});
  peer.on("error",e=>{
    if(e&&e.type==="unavailable-id"&&attempt<3)return liveHostStart(gameObj,attempt+1);
    toast("Connection error: "+((e&&e.type)||e));
  });
  peer.on("call",handleIncomingCall);
  peer.on("connection",conn=>{
    conn.on("data",d=>hostMsg(conn,d));
    conn.on("close",()=>{
      if(!L)return;
      delete L.conns[conn.peer];
      removeVideo(conn.peer);
      if(L.videoParts)L.videoParts=L.videoParts.filter(p=>p.id!==conn.peer);
      if(L.players[conn.peer]){delete L.players[conn.peer];bcastView();renderLiveHost();}
    });
  });
  renderLiveHost();
}
function hostMsg(conn,d){
  if(!L||L.role!=="host"||!d)return;
  if(d.t==="hello"){
    L.conns[conn.peer]=conn;
    L.players[conn.peer]={name:String(d.name||"player").slice(0,20),score:0};
    if(d.b!==FC_BUILD)toast("⚠️ "+(L.players[conn.peer].name)+" is on an older version — have them refresh the page");
    try{conn.send({t:"welcome",game:L.game});}catch(e){}
    bcastView();renderLiveHost();
  }
  if(d.t==="buzz"){
    if(L.screen!=="question"||L.lockedBy||L.buzzedOut.includes(conn.peer)||!L.players[conn.peer])return;
    L.lockedBy=conn.peer;stopLiveTimers();
    if(d.text){
      const q=L.game.rounds[L.ri].questions[L.qi];
      const text=String(d.text).slice(0,120);
      L.typedAnswer={name:(L.players[conn.peer]||{}).name||"?",text,ok:(q&&q.answers&&q.answers.length)?isMatch(text,q.answers):null};
    }
    bcastView();renderLiveHost();
  }
  if(d.t==="camon"){
    if(!L.videoOn||!L.players[conn.peer])return;
    if((L.videoParts||[]).length>=5)return; // host + 4 max
    if(!L.videoParts.find(p=>p.id===conn.peer))L.videoParts.push({id:conn.peer,name:(L.players[conn.peer]||{}).name||"player",mic:!!d.mic});
    if(V.stream)callParticipants();
    if(L.micOn&&L.micOn[conn.peer]){try{conn.send({t:"mic",on:true});}catch(e){}}
    bcastView();renderLiveHost();
  }
  if(d.t==="micack"){
    const nm=(L.players[conn.peer]||{}).name||"player";
    toast(d.has?("🎙 "+nm+(d.on?" is LIVE":" muted")):("⚠️ "+nm+" has no mic — they may have denied mic permission or need to refresh"));
  }
  if(d.t==="answer"){
    if(L.screen!=="question"||conn.peer!==L.lockedBy)return;
    const q=L.game.rounds[L.ri].questions[L.qi];
    const text=String(d.text||"").slice(0,120);
    L.typedAnswer={name:(L.players[conn.peer]||{}).name||"?",text,ok:(q&&q.answers&&q.answers.length)?isMatch(text,q.answers):null};
    bcastView();renderLiveHost();
  }
}

      </div>
      ${L.videoOn
        ?`<p class="muted" style="font-size:12.5px;margin-top:12px">🎥 cameras on — your mic is live to players; they get a "turn on my camera" button (up to 4)</p>`
        :`<div style="margin-top:14px"><button class="btn btn-ghost btn-sm" onclick="hostStartVideo()">🎥 Turn on cameras + host mic</button></div>`}
      <div style="margin-top:16px"><button class="btn btn-gold" ${n?"":"disabled"} onclick="liveStart()">Start game</button></div>
    </div>`;
  }else if(L.screen==="roundIntro"){
    const r=L.game.rounds[L.ri];
    body=`<div class="roundintro">
      <div class="num">Round ${L.ri+1} of ${L.game.rounds.length}</div>
      <h2 class="display">${esc(r.name)}</h2><div class="rule">${r.rule||""}</div>
      <button class="btn btn-gold" onclick="liveBeginQ()">Show first question</button></div>${chips}`;
  }else if(L.screen==="question"){
    const r=L.game.rounds[L.ri],q=r.questions[L.qi];
    const canAdvance=(r.type==="listReveal"&&L.cluesShown<q.clues.length)||(r.type==="pieces"&&L.tiles<24);
    const advLabel=r.type==="pieces"?"▶ Reveal more":"▶ Next clue";
    body=`<div class="qhead"><span class="qnum">R${L.ri+1} · Q${L.qi+1}/${r.questions.length}</span><span class="potbadge">${livePot()} pts</span></div>
    ${liveQHTML(r,q,v)}
    <div class="hostans">${L.showAns?`<b>Answer:</b> ${esc(hostAnswerText(r,q))}`:`<span class="muted">answer hidden</span>`}
      <button class="btn btn-ghost btn-sm" style="margin-left:10px" onclick="L.showAns=!L.showAns;renderLiveHost()">${L.showAns?"hide":"show"}</button>
      <span class="muted" style="font-size:11.5px;margin-left:8px">host only — hide if sharing this screen</span></div>
    <div class="card" style="margin-top:12px;padding:16px">
      ${L.lockedBy
        ?`<p style="font-weight:800;font-size:18px;margin-bottom:6px">🔔 ${esc(buzzingName||"?")} buzzed${L.answerMode==="typed"?"!":" — they answer out loud!"}</p>
          ${L.answerMode==="typed"?(L.typedAnswer
            ?`<p style="font-size:17px;margin-bottom:10px">typed: <b>“${esc(L.typedAnswer.text)}”</b> ${L.typedAnswer.ok===true?'<span style="color:var(--good);font-weight:800">· fuzzy match ✓</span>':L.typedAnswer.ok===false?'<span style="color:var(--bad);font-weight:800">· no match ✗</span>':""}</p>`
            :`<p class="muted" style="margin-bottom:10px">waiting for their typed answer…</p>`):""}
          <div class="formactions" style="margin-top:0">
            <button class="btn btn-gold btn-sm" onclick="liveJudge(true)">✓ Correct +${livePot()}</button>
            <button class="btn btn-ghost btn-sm" onclick="liveJudge(false)">✗ Wrong</button>
          </div>`
        :`<div class="formactions" style="margin-top:0;align-items:center">
            ${canAdvance?`<button class="btn btn-gold btn-sm" onclick="hostAdvance()">${advLabel}</button>
            <button class="typechip ${L.auto?"sel":""}" onclick="toggleAuto()" title="auto-reveal on a timer">⏱ auto ${L.auto?"on":"off"}</button>`:`<span class="muted" style="font-size:14px">waiting for a buzz…</span>`}
            <button class="btn btn-ghost btn-sm" onclick="liveReveal()">Reveal answer</button>
          </div>`}
    </div>${chips}`;
  }else if(L.screen==="reveal"){
    body=`<div class="card revealcard">${liveRevealHTML(L.revealData)}
      <button class="btn btn-gold" onclick="liveNext()">Next</button></div>${chips}`;
  }else if(L.screen==="scores"){
    body=`<div class="card center" style="padding:32px"><div class="tag">Round ${L.ri+1} complete</div>
      <div style="margin-top:16px">${chips}</div>
      <div style="margin-top:20px"><button class="btn btn-gold" onclick="liveNextRound()">Next round</button></div></div>`;
  }else if(L.screen==="final"){
    const ranked=Object.values(L.players).sort((a,b)=>b.score-a.score);
    body=`<div class="center"><div class="marquee">The End</div>
      ${ranked.map((p,i)=>`<div class="card" style="margin:10px 0;padding:16px;text-align:left"><b>${i+1}. ${esc(p.name)}</b> — ${p.score} pts ${i===0?"🏆":""}</div>`).join("")}
      <button class="btn btn-ghost" style="margin-top:8px" onclick="liveLeave();S=null;render()">Done</button></div>`;
  }
  app().innerHTML=`<div class="topbar"><div class="brand">Final Cut · Live</div>
    <div style="display:flex;gap:8px;align-items:center"><span class="tag">room ${L.code}</span>
    <button class="btn btn-ghost btn-sm" onclick="if(confirm('End the live room?')){liveLeave();S=null;render();}">✕ end</button></div></div>`+body;
}

/* ---- player ---- */
function liveJoin(code,name){
  if(typeof Peer==="undefined")return toast("Live rooms need internet — PeerJS didn't load");
  liveLeave();
  L={role:"player",code:code.toUpperCase(),name,peer:null,conn:null,game:null,view:{screen:"connecting"},myId:null,buzzed:false,sentAnswer:false};
  const peer=new Peer();
  L.peer=peer;
  peer.on("call",handleIncomingCall);
  peer.on("open",id=>{
    if(!L)return;
    L.myId=id;
    const conn=peer.connect("finalcut-"+code.toLowerCase(),{reliable:true});
    L.conn=conn;
    conn.on("open",()=>{try{conn.send({t:"hello",name,b:FC_BUILD});}catch(e){}});
    conn.on("data",d=>playerMsg(d));
    conn.on("close",()=>{if(L){L.view={screen:"disconnected"};renderLivePlayer();}});
  });
  peer.on("error",e=>{if(L){L.view={screen:"error"};renderLivePlayer();}});
  renderLivePlayer();
}
function playerMsg(d){
  if(!L||L.role!=="player"||!d)return;
  if(d.t==="welcome")L.game=d.game;
  if(d.t==="mic"){
    const has=V.stream&&V.stream.getAudioTracks&&V.stream.getAudioTracks().length>0;
    if(has)V.stream.getAudioTracks().forEach(t=>{t.enabled=!!d.on;});
    L.micLive=!!d.on&&has;
    if(d.on&&has)recallAll(); // fresh offers carrying live audio — most reliable path
    try{L.conn.send({t:"micack",on:!!d.on,has:!!has});}catch(e){}
    if(d.on&&has)toast("🎙 the host put you on air!");
  }
  if(d.t==="view"){
    L.view=d.v;
    if(d.v.screen!=="question")L.buzzed=false;
    if(d.v.screen!=="question"||d.v.lockedId!==L.myId)L.sentAnswer=false;
    if(V.stream)callParticipants();
  }
  renderLivePlayer();
}
function sendAnswer(){
  const e=document.getElementById("panswer");
  if(!e||!e.value.trim()||!L||!L.conn)return;
  L.sentAnswer=true;
  try{L.conn.send({t:"answer",text:e.value.trim()});}catch(err){}
  renderLivePlayer();
}
function buzz(){
  if(!L||L.buzzed||!L.conn)return;
  const v=L.view||{};
  let text=null;
  if(v.answerMode==="typed"){
    const e=document.getElementById("panswer");
    text=e?e.value.trim():"";
    if(!text)return;
    L.sentAnswer=true;
  }
  L.buzzed=true;
  try{L.conn.send(text?{t:"buzz",text:text}:{t:"buzz"});}catch(e){}
  renderLivePlayer();
}
function renderLivePlayer(){
  if(!L||L.role!=="player")return;
  setWide(false);
  const v=L.view||{};
  const head=`<div class="topbar"><div class="brand">Final Cut · Live</div><span class="tag">room ${esc(L.code)}</span></div>`;
  let body="";
  if(!v.screen||v.screen==="connecting")body=`<div class="card center" style="padding:44px">connecting to room ${esc(L.code)}…</div>`;
  else if(v.screen==="error")body=`<div class="card center" style="padding:44px">Couldn't find room <b>${esc(L.code)}</b>.<div style="margin-top:16px"><button class="btn btn-ghost btn-sm" onclick="renderLiveEntry()">try again</button></div></div>`;
  else if(v.screen==="disconnected")body=`<div class="card center" style="padding:44px">Disconnected from the host.<div style="margin-top:16px"><button class="btn btn-ghost btn-sm" onclick="renderLiveEntry()">rejoin</button></div></div>`;
  else if(v.screen==="lobby")body=`<div class="card center" style="padding:40px 22px"><div class="tag">you're in!</div>
    <p style="margin:16px 0 4px;font-size:17px">Hi <b>${esc(L.name)}</b> — waiting for the host to start…</p>${liveScoresChips(v)}
    ${v.videoOn&&!V.stream&&((v.vparts||[]).length<5)?`<div style="margin-top:16px"><button class="btn btn-gold btn-sm" onclick="playerStartVideo()">🎥 turn on my camera</button><p class="muted" style="font-size:11.5px;margin-top:6px">you start muted — only the host can put your mic on air</p></div>`:""}</div>`;
  else if(v.screen==="roundIntro"){
    const r=L.game&&L.game.rounds[v.ri];
    body=`<div class="roundintro"><div class="num">Round ${v.ri+1}</div><h2 class="display">${esc(r?r.name:"")}</h2>
    <div class="rule">${r?(r.rule||""):""}</div><p class="muted">get your buzzer finger ready…</p>
    ${v.videoOn&&!V.stream&&((v.vparts||[]).length<5)?`<div style="margin-top:10px"><button class="btn btn-ghost btn-sm" onclick="playerStartVideo()">🎥 turn on my camera</button></div>`:""}</div>`;
  }
  else if(v.screen==="question"){
    const r=L.game&&L.game.rounds[v.ri],q=r&&r.questions[v.qi];
    const out=(v.buzzedOut||[]).includes(L.myId);
    let buzzArea;
    if(v.lockedId===L.myId){
      if(v.answerMode==="typed"){
        buzzArea=L.sentAnswer
          ?`<div class="buzzmsg you">answer sent — host is checking…</div>`
          :`<div class="buzzmsg you">🔔 YOU'RE UP!</div>
            <div class="answerbar" style="max-width:420px;margin:14px auto 0">
              <input type="text" id="panswer" placeholder="type your answer…" autocomplete="off" onkeydown="if(event.key==='Enter')sendAnswer()">
              <button class="btn btn-gold" onclick="sendAnswer()">Send</button>
            </div>`;
      }else buzzArea=`<div class="buzzmsg you">🔔 YOU'RE UP — answer out loud!</div>`;
    }
    else if(v.lockedBy)buzzArea=`<div class="buzzmsg">🔔 ${esc(v.lockedBy)} buzzed…${v.typed?`<br><span class="muted" style="font-size:14px">“${esc(v.typed.text)}”</span>`:""}</div>`;
    else if(out)buzzArea=`<div class="buzzmsg out">locked out of this one 😬</div>`;
    else if(v.answerMode==="typed")buzzArea=`
      <div class="answerbar" style="max-width:420px;margin:0 auto 16px">
        <input type="text" id="panswer" placeholder="type your answer first…" autocomplete="off"
          oninput="const b=document.getElementById('buzzbtn');if(b)b.disabled=!this.value.trim()"
          onkeydown="if(event.key==='Enter')buzz()">
      </div>
      <button class="buzzbtn" id="buzzbtn" disabled onclick="buzz()">BUZZ</button>
      <p class="muted" style="font-size:12px;margin-top:10px">type your answer to unlock the buzzer — first buzz wins</p>`;
    else buzzArea=`<button class="buzzbtn" onclick="buzz()">BUZZ</button>`;
    body=`<div class="qhead"><span class="qnum">R${v.ri+1} · Q${v.qi+1}</span><span class="potbadge">${v.pot} pts</span></div>
      ${q?liveQHTML(r,q,v):""}
      <div class="center" style="margin:22px 0">${buzzArea}</div>`;
  }
  else if(v.screen==="reveal")body=`<div class="card revealcard">${liveRevealHTML(v.reveal)}</div>${liveScoresChips(v)}`;
  else if(v.screen==="scores")body=`<div class="card center" style="padding:32px"><div class="tag">scores</div><div style="margin-top:16px">${liveScoresChips(v)}</div></div>`;
  else if(v.screen==="final"){
    const ranked=Object.entries(v.scores||{}).sort((a,b)=>b[1]-a[1]);
    body=`<div class="center"><div class="marquee">The End</div>
      ${ranked.map(([n,s],i)=>`<div class="card" style="margin:10px 0;padding:16px;text-align:left"><b>${i+1}. ${esc(n)}</b> — ${s} pts ${i===0?"🏆":""}</div>`).join("")}
      <button class="btn btn-ghost" style="margin-top:8px" onclick="liveLeave();S=null;render()">Done</button></div>`;
  }
  const prev=document.getElementById("panswer");
  const keep=prev?{v:prev.value,f:document.activeElement===prev}:null;
  const mb=L.micLive?`<div class="miclive">🎙 your mic is LIVE to the room</div>`:"";
  app().innerHTML=head+mb+body;
  const ni=document.getElementById("panswer");
  if(ni&&keep){
    ni.value=keep.v;if(keep.f)ni.focus();
    const b=document.getElementById("buzzbtn");
    if(b)b.disabled=!ni.value.trim();
  }
}

/* ---------- boot ---------- */
(function(){
  try{speechSynthesis.getVoices();speechSynthesis.onvoiceschanged=function(){};}catch(e){}
  if(IMG.logo&&!IMG.logo.startsWith("__")){
    const l=document.createElement("link");l.rel="icon";l.href=IMG.logo;document.head.appendChild(l);
  }
  const h=location.hash;
  if(h&&h.startsWith("#g=")){
    try{
      const g=JSON.parse(decodeURIComponent(escape(atob(h.slice(3)))));
      if(g.rounds&&g.rounds.length){startGame(g);return;}
    }catch(e){}
  }
  render();
})();
</script>
